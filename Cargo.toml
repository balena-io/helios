[workspace]
resolver = "3"
members = [
  "helios",
  "helios-api",
  "helios-core",
  "helios-legacy",
  "helios-oci",
  "helios-remote",
  "helios-state",
]

[workspace.package]
version = "0.10.0"
rust-version = "1.83"
edition = "2021"

description = "Balena's on-device agent"
homepage = "https://github.com/balena-io/helios"
repository = "https://github.com/balena-io/helios"
authors = ["Balena Inc. <hello@balena.io>"]
license = "Apache-2.0"
readme = "README.md"
publish = false

[workspace.dependencies]
axum = { version = "0.8.4", default-features = false, features = ["tokio", "http1", "json", "query"] }
bollard = { version = "0.19.2", default-features = false }
clap = { version = "4.5", default-features = false, features = ["std", "derive", "env"] }
dirs = { version = "6.0.0", default-features = false }
fastrand = { version = "2.3.0", default-features = false }
futures-lite = { version = "2.6.1", default-features = false }
mahler = { version = "0.19.6" }
rand = { version = "0.9.2", default-features = false }
regex = { version = "1.11", default-features = false }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "brotli", "stream"] }
serde = { version = "1.0", default-features = false, features = ["derive"] }
serde_json = { version = "1.0", default-features = false }
sha2 = { version = "0.10.9", default-features = false }
thiserror = { version = "2", default-features = false }
tokio = { version = "1.47.1", default-features = false, features = ["rt-multi-thread", "macros", "time", "fs"] }
tower-http = { version = "0.6.6", default-features = false, features = ["trace"] }
tracing = { version = "0.1.41", default-features = false }
tracing-subscriber = { version = "0.3.20", default-features = false, features = ["env-filter", "fmt", "registry", "ansi"] }
uuid = { version = "1.18", default-features = false, features = ["v4"] }

# dev-only dependencies
mockito = { version = "1.7", default-features = false }
pretty_assertions = { version = "1.4.1", default-features = false }

[profile.release]
opt-level = "z"
codegen-units = 1
