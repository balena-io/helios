version: '2.4'

services:
  sut:
    build:
      context: .
      dockerfile: ./helios-integration-tests/Dockerfile
    environment:
      DOCKER_HOST: 'unix:///var/run/docker.sock'
      DBUS_SYSTEM_BUS_ADDRESS: 'unix:path=/shared/dbus/system_bus_socket'
    volumes:
      - dind:/var/run
      - dbus:/shared/dbus
      - runtime:/tmp/run
    depends_on:
      docker:
        condition: service_healthy
      helios-api:
        condition: service_started
      mock-remote:
        condition: service_healthy
      systemd:
        condition: service_healthy

  helios-api:
    build:
      context: ./
      args:
        HELIOS_FEATURES: all
    image: helios
    command: socat TCP-LISTEN:80,reuseaddr,fork UNIX-CONNECT:/tmp/run/helios.sock
    depends_on:
      helios:
        condition: service_healthy
    volumes:
      - runtime:/tmp/run
    healthcheck:
      test: ['CMD', 'wget', '-O', '-', '-q', 'http://127.0.0.1/ping']

  # Override default configurations
  helios:
    build:
      context: ./
      args:
        HELIOS_FEATURES: all
        HELIOS_BUILD: 'debug'
    image: helios
    # Set-up required variables
    environment:
      DOCKER_HOST: 'unix:///var/run/docker.sock'
      BALENA_DEVICE_UUID: 'test-uuid'
      BALENA_SUPERVISOR_PORT: 48484
      BALENA_API_URL: 'http://mock-remote'
      BALENA_API_KEY: 'test-api-key'
      BALENA_HOST_RUNTIME_DIR: '/tmp/run'
      BALENA_HOST_OS_VERSION: 'balenaOS 6.0.39'
      BALENA_HOST_OS_BOARD_REV: 'test-board-rev-000'
      DBUS_SYSTEM_BUS_ADDRESS: 'unix:path=/shared/dbus/system_bus_socket'
      HELIOS_REMOTE_POLL_MIN_INTERVAL_MS: '500'
      HELIOS_REMOTE_POLL_MAX_JITTER_MS: '0'
    volumes:
      - dind:/var/run
      - dbus:/shared/dbus
    depends_on:
      docker:
        condition: service_healthy
      mock-remote:
        condition: service_healthy
      systemd:
        condition: service_healthy

  mock-remote:
    build:
      context: .
      dockerfile: ./helios-integration-tests/Dockerfile.mock-remote
    environment:
      RUST_LOG: debug
    healthcheck:
      test: ['CMD', 'wget', '-O', '-', '-q', 'http://127.0.0.1/health']
      interval: 5s
      retries: 10
      timeout: 3s

  docker:
    image: docker:28-dind
    privileged: true
    command: ['--insecure-registry', 'registry:5000']
    volumes:
      - dind:/var/run
    depends_on:
      registry:
        condition: service_started
    healthcheck:
      test: ['CMD', 'docker', 'ps']
      interval: 10s
      retries: 5
      timeout: 5s

  registry:
    image: registry:3
    volumes:
      - registry:/var/lib/registry

  systemd:
    image: ghcr.io/balena-os/mock-systemd-bus
    privileged: true
    environment:
      DBUS_SYSTEM_BUS_ADDRESS: 'unix:path=/shared/dbus/system_bus_socket'
    volumes:
      - dbus:/shared/dbus
      - runtime:/tmp/run
    healthcheck:
      test:
        [
          'CMD',
          'dbus-send',
          '--system',
          '--print-reply',
          '--dest=org.freedesktop.systemd1',
          '/org/freedesktop/systemd1',
          'org.freedesktop.DBus.Introspectable.Introspect',
        ]
      interval: 5s
      retries: 10
      timeout: 3s

volumes:
  dbus:
    driver_opts:
      type: tmpfs
      device: tmpfs
  runtime:
    driver_opts:
      type: tmpfs
      o: ''
      device: tmpfs
  dind:
  registry:
